<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peregrine — Explore (Material You, dark)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<style>
:root{--font-sans:"Roboto","Segoe UI",system-ui,sans-serif;--color-background-secondary:#1b1b1f;--border-radius-lg:16px}
*{box-sizing:border-box}
body{margin:0;background:#0c0c0f;display:flex;justify-content:center;align-items:flex-start;padding:32px 16px;font-family:var(--font-sans)}
.lv-wrap{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:24px;display:flex;justify-content:center}
.lv-phone{width:322px;background:#000;border-radius:42px;padding:8px}
.lv-screen{--surface:#141218;--sc:#211F26;--sch:#2B2930;--on:#E6E0E9;--onv:#CAC4D0;--pri:#D0BCFF;--secc:#4A4458;--osecc:#E8DEF8;--ol:#49454F;background:var(--surface);border-radius:34px;overflow:hidden;color:var(--on);font-family:var(--font-sans)}
.lv-status{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 4px;font-size:13px;font-weight:500}
.lv-status .r{display:flex;gap:6px;font-size:14px}
.lv-bar{display:flex;align-items:center;gap:4px;padding:6px 8px 6px 20px}
.lv-title{flex:1;font-size:22px;font-weight:500}
.lv-ib{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--onv);font-size:22px;background:none;border:none;cursor:pointer}
.ex-search{margin:4px 16px 12px;display:flex;align-items:center;gap:10px;background:var(--sch);border-radius:26px;padding:11px 15px}
.ex-search .lead{font-size:20px;color:var(--onv)}
.ex-ph{flex:1;color:var(--onv);font-size:14px}
.ex-search .trail{font-size:20px;color:var(--pri)}
.ex-chips{display:flex;gap:8px;overflow-x:auto;padding:0 16px 12px;scrollbar-width:none}
.ex-chips::-webkit-scrollbar{display:none}
.ex-chip{flex:0 0 auto;display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;padding:7px 13px;border-radius:9px;border:1px solid var(--ol);color:var(--onv);white-space:nowrap}
.ex-chip.sel{background:#4F378B;color:#EADDFF;border-color:#4F378B}
.ex-mrow{display:flex;align-items:center;padding:0 16px 10px}
.ex-count{font-size:13px;color:var(--onv)}
.ex-sort{margin-left:auto;display:flex;align-items:center;gap:5px;color:var(--on);font-size:13px;font-weight:500}
.ex-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 14px}
.ex-card{position:relative;border-radius:16px;overflow:hidden;height:124px;background:var(--sc);cursor:pointer}
.ex-scene{position:absolute;inset:0}
.ex-cat{position:absolute;left:7px;top:7px;font-size:10px;font-weight:500;padding:3px 8px;border-radius:7px;display:flex;align-items:center;gap:4px}
.ex-name{position:absolute;left:7px;bottom:7px;background:rgba(20,18,24,.6);color:var(--on);font-size:11px;font-weight:500;padding:3px 8px;border-radius:7px}
.ex-time{position:absolute;right:7px;bottom:7px;background:rgba(20,18,24,.6);color:var(--on);font-size:11px;font-weight:500;padding:3px 8px;border-radius:7px}
.cat-person{background:#4F378B;color:#EADDFF}
.cat-vehicle{background:#234B6E;color:#CFE5FF}
.cat-animal{background:#2E4B33;color:#BCEFBE}
.lv-nav{display:flex;background:var(--sc);padding:10px 6px 16px}
.lv-ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.lv-pill{width:54px;height:30px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--onv)}
.lv-ni.act .lv-pill{background:var(--pri);color:#381E72}
.lv-nl{font-size:12px;font-weight:500;color:var(--onv)}
.lv-ni.act .lv-nl{color:var(--pri)}
</style>
</head>
<body>
<div class="lv-wrap">
<div class="lv-phone">
<div class="lv-screen">

  <div class="lv-status">
    <span>9:41</span>
    <span class="r"><i class="ti ti-antenna-bars-4" aria-hidden="true"></i><i class="ti ti-wifi" aria-hidden="true"></i><i class="ti ti-battery-3" aria-hidden="true"></i></span>
  </div>

  <div class="lv-bar">
    <span class="lv-title">Explore</span>
    <button class="lv-ib" aria-label="Calendar"><i class="ti ti-calendar" aria-hidden="true"></i></button>
  </div>

  <div class="ex-chips">
    <span class="ex-chip"><i class="ti ti-filter" style="font-size:15px" aria-hidden="true"></i>Filters</span>
    <span class="ex-chip sel"><i class="ti ti-user" style="font-size:14px" aria-hidden="true"></i>Person</span>
    <span class="ex-chip">Car</span>
    <span class="ex-chip">Dog</span>
    <span class="ex-chip">Front door</span>
  </div>

  <div class="ex-mrow">
    <span class="ex-count">142 events</span>
    <span class="ex-sort"><i class="ti ti-arrows-sort" style="font-size:16px" aria-hidden="true"></i>Newest</span>
  </div>

  <div class="ex-grid">

    <div class="ex-card">
      <div class="ex-scene" style="background:#2f2622">
        <div style="position:absolute;left:40%;top:30%;width:18px;height:42px;background:#4a3b32;border-radius:9px 9px 0 0"></div>
        <div style="position:absolute;left:43%;top:24%;width:14px;height:14px;border-radius:50%;background:#4a3b32"></div>
      </div>
      <span class="ex-cat cat-person"><i class="ti ti-user" style="font-size:12px" aria-hidden="true"></i>Person</span>
      <span class="ex-name">Front door</span>
      <span class="ex-time">2m</span>
    </div>

    <div class="ex-card">
      <div class="ex-scene" style="background:#26262a">
        <div style="position:absolute;left:22%;top:46%;width:56%;height:34%;background:#3a3a40;border-radius:10px 10px 4px 4px"></div>
        <div style="position:absolute;left:28%;top:48%;width:44%;height:14%;background:#4d6b78;border-radius:6px"></div>
      </div>
      <span class="ex-cat cat-vehicle"><i class="ti ti-car" style="font-size:12px" aria-hidden="true"></i>Car</span>
      <span class="ex-name">Driveway</span>
      <span class="ex-time">8m</span>
    </div>

    <div class="ex-card">
      <div class="ex-scene" style="background:#23341f">
        <div style="position:absolute;left:50%;top:56%;width:34px;height:16px;border-radius:9px;background:#1b140f"></div>
        <div style="position:absolute;left:48%;top:52%;width:11px;height:11px;border-radius:50%;background:#1b140f"></div>
      </div>
      <span class="ex-cat cat-animal"><i class="ti ti-dog" style="font-size:12px" aria-hidden="true"></i>Dog</span>
      <span class="ex-name">Backyard</span>
      <span class="ex-time">21m</span>
    </div>

    <div class="ex-card">
      <div class="ex-scene" style="background:#1d2630">
        <div style="position:absolute;left:42%;top:28%;width:18px;height:42px;background:#33404a;border-radius:9px 9px 0 0"></div>
        <div style="position:absolute;left:45%;top:22%;width:14px;height:14px;border-radius:50%;background:#33404a"></div>
      </div>
      <span class="ex-cat cat-person"><i class="ti ti-user" style="font-size:12px" aria-hidden="true"></i>Person</span>
      <span class="ex-name">Side gate</span>
      <span class="ex-time">34m</span>
    </div>

    <div class="ex-card">
      <div class="ex-scene" style="background:#2a2520">
        <div style="position:absolute;left:20%;top:48%;width:60%;height:30%;background:#403a33;border-radius:10px 10px 4px 4px"></div>
        <div style="position:absolute;left:27%;top:50%;width:46%;height:13%;background:#6b5a3f;border-radius:6px"></div>
      </div>
      <span class="ex-cat cat-vehicle"><i class="ti ti-car" style="font-size:12px" aria-hidden="true"></i>Car</span>
      <span class="ex-name">Driveway</span>
      <span class="ex-time">1h</span>
    </div>

    <div class="ex-card">
      <div class="ex-scene" style="background:#1a2a22">
        <div style="position:absolute;left:14%;top:24%;width:30px;height:30px;border-radius:50%;background:#26402f"></div>
        <div style="position:absolute;left:55%;top:58%;width:30px;height:14px;border-radius:8px;background:#161a12"></div>
      </div>
      <span class="ex-cat cat-animal"><i class="ti ti-dog" style="font-size:12px" aria-hidden="true"></i>Dog</span>
      <span class="ex-name">Backyard</span>
      <span class="ex-time">2h</span>
    </div>

    <div class="ex-card">
      <div class="ex-scene" style="background:#2f2622">
        <div style="position:absolute;left:38%;top:30%;width:18px;height:42px;background:#473a31;border-radius:9px 9px 0 0"></div>
        <div style="position:absolute;left:41%;top:24%;width:14px;height:14px;border-radius:50%;background:#473a31"></div>
      </div>
      <span class="ex-cat cat-person"><i class="ti ti-user" style="font-size:12px" aria-hidden="true"></i>Person</span>
      <span class="ex-name">Front door</span>
      <span class="ex-time">3h</span>
    </div>

    <div class="ex-card">
      <div class="ex-scene" style="background:#26262a">
        <div style="position:absolute;left:22%;top:48%;width:56%;height:32%;background:#3a3a40;border-radius:10px 10px 4px 4px"></div>
        <div style="position:absolute;left:28%;top:50%;width:44%;height:13%;background:#4d6b78;border-radius:6px"></div>
      </div>
      <span class="ex-cat cat-vehicle"><i class="ti ti-car" style="font-size:12px" aria-hidden="true"></i>Car</span>
      <span class="ex-name">Driveway</span>
      <span class="ex-time">5h</span>
    </div>

  </div>

  <div class="lv-nav">
    <div class="lv-ni"><div class="lv-pill"><i class="ti ti-video" aria-hidden="true"></i></div><span class="lv-nl">Live</span></div>
    <div class="lv-ni"><div class="lv-pill"><i class="ti ti-player-track-prev" aria-hidden="true"></i></div><span class="lv-nl">Review</span></div>
    <div class="lv-ni act"><div class="lv-pill"><i class="ti ti-compass" aria-hidden="true"></i></div><span class="lv-nl">Explore</span></div>
    <div class="lv-ni"><div class="lv-pill"><i class="ti ti-settings" aria-hidden="true"></i></div><span class="lv-nl">Settings</span></div>
  </div>

</div>
</div>
</div>
</body>
</html>
