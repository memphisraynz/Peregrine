<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peregrine — Review (Material You, dark)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<style>
:root{--font-sans:"Roboto","Segoe UI",system-ui,sans-serif;--color-background-secondary:#1b1b1f;--border-radius-lg:16px}
*{box-sizing:border-box}
body{margin:0;background:#0c0c0f;display:flex;justify-content:center;align-items:flex-start;padding:32px 16px;font-family:var(--font-sans)}
.lv-wrap{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:24px;display:flex;justify-content:center}
.lv-phone{width:330px;background:#000;border-radius:40px;padding:8px}
.lv-screen{--surface:#141218;--sc:#211F26;--sch:#2B2930;--on:#E6E0E9;--onv:#CAC4D0;--pri:#D0BCFF;--secc:#4A4458;--osecc:#E8DEF8;--ol:#49454F;background:var(--surface);border-radius:33px;overflow:hidden;color:var(--on);font-family:var(--font-sans)}
.lv-status{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 4px;font-size:13px;font-weight:500}
.lv-status .r{display:flex;gap:6px;font-size:14px}
.lv-bar{display:flex;align-items:center;gap:4px;padding:6px 8px 6px 20px}
.lv-title{flex:1;font-size:22px;font-weight:500}
.lv-ib{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--onv);font-size:22px;background:none;border:none;cursor:pointer}
.lv-ib:hover{background:var(--sch)}
.rv-seg{display:flex;margin:4px 16px 14px;border:1px solid var(--ol);border-radius:20px;overflow:hidden}
.rv-seg button{flex:1;background:none;border:none;color:var(--onv);font-size:13px;font-weight:500;padding:9px 0;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer}
.rv-seg button.on{background:var(--secc);color:var(--osecc)}
.rv-day{display:flex;align-items:center;gap:11px;padding:2px 16px 12px}
.rv-day h3{font-size:13px;font-weight:500;color:var(--onv);margin:0;letter-spacing:.3px}
.rv-day .ln{flex:1;height:1px;background:var(--ol)}
.rv-list{padding:0 16px;display:flex;flex-direction:column;gap:14px;margin-bottom:16px}
.rv-item{position:relative;border-radius:18px;overflow:hidden;height:148px;background:var(--sc);cursor:pointer}
.rv-scene{position:absolute;inset:0}
.rv-cat{position:absolute;left:10px;top:10px;font-size:12px;font-weight:500;padding:4px 11px;border-radius:8px;display:flex;align-items:center;gap:5px}
.rv-name{position:absolute;left:10px;bottom:10px;display:flex;align-items:center;gap:6px;background:rgba(20,18,24,.62);color:var(--on);font-size:13px;font-weight:500;padding:5px 12px;border-radius:8px}
.rv-time{position:absolute;right:10px;bottom:10px;background:rgba(20,18,24,.62);color:var(--on);font-size:12px;font-weight:500;padding:5px 11px;border-radius:8px}
.rv-new{position:absolute;right:10px;top:10px;width:11px;height:11px;border-radius:50%;background:var(--pri);border:2px solid #141218}
.cat-person{background:#4F378B;color:#EADDFF}
.cat-vehicle{background:#234B6E;color:#CFE5FF}
.cat-animal{background:#2E4B33;color:#BCEFBE}
.lv-nav{display:flex;background:var(--sc);padding:10px 6px 16px}
.lv-ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.lv-pill{width:54px;height:30px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--onv)}
.lv-ni.act .lv-pill{background:var(--pri);color:#381E72}
.lv-nl{font-size:12px;font-weight:500;color:var(--onv)}
.lv-ni.act .lv-nl{color:var(--pri)}
</style>
</head>
<body>
<div class="lv-wrap">
<div class="lv-phone">
<div class="lv-screen">

  <div class="lv-status">
    <span>9:41</span>
    <span class="r"><i class="ti ti-antenna-bars-4" aria-hidden="true"></i><i class="ti ti-wifi" aria-hidden="true"></i><i class="ti ti-battery-3" aria-hidden="true"></i></span>
  </div>

  <div class="lv-bar">
    <span class="lv-title">Review</span>
    <button class="lv-ib" aria-label="Pick date"><i class="ti ti-calendar" aria-hidden="true"></i></button>
    <button class="lv-ib" aria-label="Filter"><i class="ti ti-filter" aria-hidden="true"></i></button>
  </div>

  <div class="rv-seg">
    <button class="on"><i class="ti ti-check" style="font-size:16px" aria-hidden="true"></i>Alerts</button>
    <button>Detections</button>
  </div>

  <div class="rv-day"><h3>Today</h3><span class="ln"></span></div>

  <div class="rv-list">

    <div class="rv-item">
      <div class="rv-scene" style="background:#241d1a">
        <div style="position:absolute;inset:0 0 38% 0;background:#2f2622"></div>
        <div style="position:absolute;left:30%;top:14%;width:40%;height:62%;background:#3a2e27;border-radius:3px"></div>
        <div style="position:absolute;left:14%;top:8%;width:16px;height:16px;border-radius:50%;background:#7a5a32"></div>
        <div style="position:absolute;left:39%;top:30%;width:22px;height:50px;background:#4a3b32;border-radius:11px 11px 0 0"></div>
        <div style="position:absolute;left:42%;top:24%;width:16px;height:16px;border-radius:50%;background:#4a3b32"></div>
      </div>
      <span class="rv-cat cat-person"><i class="ti ti-user" style="font-size:14px" aria-hidden="true"></i>Person</span>
      <span class="rv-new"></span>
      <span class="rv-name"><i class="ti ti-door" style="font-size:15px" aria-hidden="true"></i>Front door</span>
      <span class="rv-time">2m ago</span>
    </div>

    <div class="rv-item">
      <div class="rv-scene" style="background:#26262a">
        <div style="position:absolute;inset:0 0 50% 0;background:#1c2622"></div>
        <div style="position:absolute;left:30%;top:48%;width:40%;height:30%;background:#3a3a40;border-radius:14px 14px 6px 6px"></div>
        <div style="position:absolute;left:35%;top:50%;width:30%;height:13%;background:#4d6b78;border-radius:8px"></div>
      </div>
      <span class="rv-cat cat-vehicle"><i class="ti ti-car" style="font-size:14px" aria-hidden="true"></i>Car</span>
      <span class="rv-new"></span>
      <span class="rv-name"><i class="ti ti-driveway" style="font-size:15px" aria-hidden="true"></i>Driveway</span>
      <span class="rv-time">8m ago</span>
    </div>

    <div class="rv-item">
      <div class="rv-scene" style="background:#1d2630">
        <div style="position:absolute;inset:0 0 40% 0;background:#222d38"></div>
        <div style="position:absolute;left:40%;top:24%;width:22px;height:50px;background:#33404a;border-radius:11px 11px 0 0"></div>
        <div style="position:absolute;left:43%;top:18%;width:16px;height:16px;border-radius:50%;background:#33404a"></div>
      </div>
      <span class="rv-cat cat-person"><i class="ti ti-user" style="font-size:14px" aria-hidden="true"></i>Person</span>
      <span class="rv-name"><i class="ti ti-fence" style="font-size:15px" aria-hidden="true"></i>Side gate</span>
      <span class="rv-time">34m ago</span>
    </div>

  </div>

  <div class="rv-day"><h3>Yesterday</h3><span class="ln"></span></div>

  <div class="rv-list">

    <div class="rv-item">
      <div class="rv-scene" style="background:#16202a">
        <div style="position:absolute;inset:46% 0 0 0;background:#23341f"></div>
        <div style="position:absolute;left:8%;top:20%;width:34px;height:34px;border-radius:50%;background:#2c401f"></div>
        <div style="position:absolute;left:60%;top:64%;width:34px;height:16px;border-radius:9px;background:#1b140f"></div>
        <div style="position:absolute;left:58%;top:60%;width:10px;height:10px;border-radius:50%;background:#1b140f"></div>
      </div>
      <span class="rv-cat cat-animal"><i class="ti ti-dog" style="font-size:14px" aria-hidden="true"></i>Dog</span>
      <span class="rv-name"><i class="ti ti-tree" style="font-size:15px" aria-hidden="true"></i>Backyard</span>
      <span class="rv-time">9:42 PM</span>
    </div>

    <div class="rv-item">
      <div class="rv-scene" style="background:#26262a">
        <div style="position:absolute;inset:0 0 50% 0;background:#1c2622"></div>
        <div style="position:absolute;left:30%;top:48%;width:40%;height:30%;background:#3a3a40;border-radius:14px 14px 6px 6px"></div>
        <div style="position:absolute;left:35%;top:50%;width:30%;height:13%;background:#4d6b78;border-radius:8px"></div>
      </div>
      <span class="rv-cat cat-vehicle"><i class="ti ti-car" style="font-size:14px" aria-hidden="true"></i>Car</span>
      <span class="rv-name"><i class="ti ti-driveway" style="font-size:15px" aria-hidden="true"></i>Driveway</span>
      <span class="rv-time">6:15 PM</span>
    </div>

  </div>

  <div class="lv-nav">
    <div class="lv-ni"><div class="lv-pill"><i class="ti ti-video" aria-hidden="true"></i></div><span class="lv-nl">Live</span></div>
    <div class="lv-ni act"><div class="lv-pill"><i class="ti ti-player-track-prev" aria-hidden="true"></i></div><span class="lv-nl">Review</span></div>
    <div class="lv-ni"><div class="lv-pill"><i class="ti ti-compass" aria-hidden="true"></i></div><span class="lv-nl">Explore</span></div>
    <div class="lv-ni"><div class="lv-pill"><i class="ti ti-settings" aria-hidden="true"></i></div><span class="lv-nl">Settings</span></div>
  </div>

</div>
</div>
</div>
</body>
</html>
