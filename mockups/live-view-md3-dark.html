<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peregrine — Live View (Material You, dark) + alerts carousel</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<style>
:root{--font-sans:"Roboto","Segoe UI",system-ui,sans-serif;--color-background-secondary:#1b1b1f;--border-radius-lg:16px}
*{box-sizing:border-box}
body{margin:0;background:#0c0c0f;display:flex;justify-content:center;align-items:flex-start;padding:32px 16px;font-family:var(--font-sans)}
.lv-wrap{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:24px;display:flex;justify-content:center}
.lv-phone{width:330px;background:#000;border-radius:40px;padding:8px}
.lv-screen{--surface:#141218;--sc:#211F26;--sch:#2B2930;--on:#E6E0E9;--onv:#CAC4D0;--pri:#D0BCFF;--secc:#4A4458;--osecc:#E8DEF8;--ol:#49454F;background:var(--surface);border-radius:33px;overflow:hidden;color:var(--on);font-family:var(--font-sans)}
.lv-status{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 4px;font-size:13px;font-weight:500}
.lv-status .r{display:flex;gap:6px;font-size:14px}
.lv-bar{display:flex;align-items:center;gap:4px;padding:6px 8px 6px 20px}
.lv-title{flex:1;font-size:22px;font-weight:500}
.lv-ib{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--onv);font-size:22px;background:none;border:none;cursor:pointer}
.lv-ib:hover{background:var(--sch)}
.lv-shead{display:flex;align-items:center;gap:8px;padding:6px 16px 8px}
.lv-shead h3{font-size:15px;font-weight:500;margin:0}
.lv-badge{background:#FFB4AB;color:#690005;font-size:12px;font-weight:500;min-width:20px;height:20px;padding:0 6px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.lv-link{margin-left:auto;display:flex;align-items:center;gap:2px;color:var(--pri);font-size:13px;font-weight:500;cursor:pointer}
.lv-car{display:flex;gap:10px;overflow-x:auto;padding:0 16px 14px;scrollbar-width:none}
.lv-car::-webkit-scrollbar{display:none}
.lv-acard{flex:0 0 auto;width:130px;background:var(--sch);border-radius:16px;overflow:hidden;cursor:pointer}
.lv-athumb{position:relative;height:84px}
.lv-acat{position:absolute;left:7px;top:7px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:7px;display:flex;align-items:center;gap:4px}
.lv-ameta{display:flex;align-items:center;justify-content:space-between;padding:7px 10px}
.lv-acam{font-size:12px;font-weight:500;color:var(--on)}
.lv-atime{font-size:11px;color:var(--onv)}
.lv-sep{display:flex;align-items:center;gap:11px;padding:2px 16px 12px}
.lv-secbox{display:inline-flex;align-items:center;gap:7px;background:var(--sc);border-radius:11px;padding:7px 13px;font-size:13px;font-weight:500;color:var(--on);white-space:nowrap}
.lv-secbox i{font-size:16px;color:var(--onv)}
.lv-sepline{flex:1;height:1px;background:var(--ol)}
.lv-list{padding:0 16px 12px;display:flex;flex-direction:column;gap:14px}
.lv-cam{position:relative;border-radius:18px;overflow:hidden;height:150px;background:var(--sc)}
.lv-scene{position:absolute;inset:0}
.lv-cam::after{content:"";position:absolute;top:0;left:-40%;width:30%;height:100%;background:rgba(255,255,255,.05);transform:skewX(-12deg);animation:lvscan 5s linear infinite}
@keyframes lvscan{0%{left:-40%}60%,100%{left:130%}}
.lv-name{position:absolute;left:10px;bottom:10px;display:flex;align-items:center;gap:6px;background:rgba(20,18,24,.62);color:var(--on);font-size:13px;font-weight:500;padding:5px 12px;border-radius:8px}
.lv-det{position:absolute;right:10px;bottom:10px;display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;padding:5px 11px;border-radius:8px}
.lv-box{position:absolute;border:2px solid;border-radius:4px}
.lv-box span{position:absolute;top:-19px;left:-2px;font-size:10px;font-weight:500;padding:1px 6px;border-radius:4px}
.cat-person{background:#4F378B;color:#EADDFF}
.cat-vehicle{background:#234B6E;color:#CFE5FF}
.cat-animal{background:#2E4B33;color:#BCEFBE}
.lv-nav{display:flex;background:var(--sc);padding:10px 6px 16px}
.lv-ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.lv-pill{width:54px;height:30px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--onv)}
.lv-ni.act .lv-pill{background:var(--pri);color:#381E72}
.lv-nl{font-size:12px;font-weight:500;color:var(--onv)}
.lv-ni.act .lv-nl{color:var(--pri)}
</style>
</head>
<body>
<div class="lv-wrap">
<div class="lv-phone">
<div class="lv-screen">

  <div class="lv-status">
    <span>9:41</span>
    <span class="r"><i class="ti ti-antenna-bars-4" aria-hidden="true"></i><i class="ti ti-wifi" aria-hidden="true"></i><i class="ti ti-battery-3" aria-hidden="true"></i></span>
  </div>

  <div class="lv-bar">
    <span class="lv-title">Live</span>
    <button class="lv-ib" aria-label="Switch to grid layout"><i class="ti ti-layout-grid" aria-hidden="true"></i></button>
    <button class="lv-ib" aria-label="More options"><i class="ti ti-dots-vertical" aria-hidden="true"></i></button>
  </div>

  <div class="lv-shead">
    <h3>Active alerts</h3><span class="lv-badge">4</span>
    <span class="lv-link">Review all<i class="ti ti-chevron-right" style="font-size:16px" aria-hidden="true"></i></span>
  </div>

  <div class="lv-car">
    <div class="lv-acard">
      <div class="lv-athumb" style="background:#2f2622">
        <div style="position:absolute;left:38%;top:30%;width:20px;height:42px;background:#4a3b32;border-radius:10px 10px 0 0"></div>
        <div style="position:absolute;left:41%;top:24%;width:14px;height:14px;border-radius:50%;background:#4a3b32"></div>
        <span class="lv-acat cat-person"><i class="ti ti-user" style="font-size:13px" aria-hidden="true"></i>Person</span>
      </div>
      <div class="lv-ameta"><span class="lv-acam">Front door</span><span class="lv-atime">2m</span></div>
    </div>
    <div class="lv-acard">
      <div class="lv-athumb" style="background:#26262a">
        <div style="position:absolute;left:24%;top:46%;width:52%;height:34%;background:#3a3a40;border-radius:10px 10px 4px 4px"></div>
        <div style="position:absolute;left:30%;top:48%;width:40%;height:14%;background:#4d6b78;border-radius:6px"></div>
        <span class="lv-acat cat-vehicle"><i class="ti ti-car" style="font-size:13px" aria-hidden="true"></i>Car</span>
      </div>
      <div class="lv-ameta"><span class="lv-acam">Driveway</span><span class="lv-atime">8m</span></div>
    </div>
    <div class="lv-acard">
      <div class="lv-athumb" style="background:#23341f">
        <div style="position:absolute;left:54%;top:58%;width:30px;height:14px;border-radius:8px;background:#1b140f"></div>
        <div style="position:absolute;left:52%;top:54%;width:9px;height:9px;border-radius:50%;background:#1b140f"></div>
        <span class="lv-acat cat-animal"><i class="ti ti-dog" style="font-size:13px" aria-hidden="true"></i>Dog</span>
      </div>
      <div class="lv-ameta"><span class="lv-acam">Backyard</span><span class="lv-atime">21m</span></div>
    </div>
    <div class="lv-acard">
      <div class="lv-athumb" style="background:#1d2630">
        <div style="position:absolute;left:40%;top:30%;width:18px;height:40px;background:#33404a;border-radius:9px 9px 0 0"></div>
        <div style="position:absolute;left:43%;top:25%;width:13px;height:13px;border-radius:50%;background:#33404a"></div>
        <span class="lv-acat cat-person"><i class="ti ti-user" style="font-size:13px" aria-hidden="true"></i>Person</span>
      </div>
      <div class="lv-ameta"><span class="lv-acam">Side gate</span><span class="lv-atime">34m</span></div>
    </div>
  </div>

  <div class="lv-sep">
    <span class="lv-secbox"><i class="ti ti-video" aria-hidden="true"></i>All cameras</span>
    <span class="lv-sepline"></span>
  </div>

  <div class="lv-list">

    <div class="lv-cam">
      <div class="lv-scene" style="background:#241d1a">
        <div style="position:absolute;inset:0 0 38% 0;background:#2f2622"></div>
        <div style="position:absolute;left:30%;top:14%;width:40%;height:62%;background:#3a2e27;border-radius:3px"></div>
        <div style="position:absolute;left:14%;top:8%;width:16px;height:16px;border-radius:50%;background:#7a5a32"></div>
        <div style="position:absolute;left:39%;top:30%;width:22px;height:50px;background:#4a3b32;border-radius:11px 11px 0 0"></div>
        <div style="position:absolute;left:42%;top:24%;width:16px;height:16px;border-radius:50%;background:#4a3b32"></div>
      </div>
      <div class="lv-box" style="left:35%;top:22%;width:30%;height:54%;border-color:#D0BCFF"><span style="background:#D0BCFF;color:#381E72">person 87%</span></div>
      <span class="lv-name"><i class="ti ti-door" style="font-size:15px" aria-hidden="true"></i>Front door</span>
      <span class="lv-det cat-person"><i class="ti ti-user" style="font-size:14px" aria-hidden="true"></i>Person</span>
    </div>

    <div class="lv-cam">
      <div class="lv-scene" style="background:#16202a">
        <div style="position:absolute;inset:46% 0 0 0;background:#23341f"></div>
        <div style="position:absolute;left:8%;top:20%;width:34px;height:34px;border-radius:50%;background:#2c401f"></div>
        <div style="position:absolute;left:18%;top:46%;width:8px;height:22px;background:#3a2c20"></div>
        <div style="position:absolute;left:60%;top:64%;width:34px;height:16px;border-radius:9px;background:#1b140f"></div>
        <div style="position:absolute;left:58%;top:60%;width:10px;height:10px;border-radius:50%;background:#1b140f"></div>
      </div>
      <div class="lv-box" style="left:55%;top:56%;width:24%;height:24%;border-color:#9BE0A0"><span style="background:#9BE0A0;color:#0A3311">dog 79%</span></div>
      <span class="lv-name"><i class="ti ti-tree" style="font-size:15px" aria-hidden="true"></i>Backyard</span>
      <span class="lv-det cat-animal"><i class="ti ti-dog" style="font-size:14px" aria-hidden="true"></i>Dog</span>
    </div>

    <div class="lv-cam">
      <div class="lv-scene" style="background:#26262a">
        <div style="position:absolute;inset:0 0 50% 0;background:#1c2622"></div>
        <div style="position:absolute;left:50%;top:8%;transform:translateX(-50%);width:0;height:0;border-left:60px solid transparent;border-right:60px solid transparent;border-bottom:74px solid #2f2f34"></div>
        <div style="position:absolute;left:30%;top:48%;width:40%;height:30%;background:#3a3a40;border-radius:14px 14px 6px 6px"></div>
        <div style="position:absolute;left:35%;top:50%;width:30%;height:13%;background:#4d6b78;border-radius:8px"></div>
      </div>
      <div class="lv-box" style="left:28%;top:44%;width:44%;height:38%;border-color:#A6CBFF"><span style="background:#A6CBFF;color:#0A2A4D">car 92%</span></div>
      <span class="lv-name"><i class="ti ti-driveway" style="font-size:15px" aria-hidden="true"></i>Driveway</span>
      <span class="lv-det cat-vehicle"><i class="ti ti-car" style="font-size:14px" aria-hidden="true"></i>Car</span>
    </div>

    <div class="lv-cam">
      <div class="lv-scene" style="background:#161519">
        <div style="position:absolute;inset:0 0 30% 0;background:#1d1c21"></div>
        <div style="position:absolute;left:10%;top:14%;width:26%;height:24%;background:#232228;border-radius:3px"></div>
        <div style="position:absolute;left:64%;top:14%;width:26%;height:24%;background:#232228;border-radius:3px"></div>
        <div style="position:absolute;left:30%;top:54%;width:40%;height:24%;background:#26252b;border-radius:12px 12px 4px 4px"></div>
      </div>
      <span class="lv-name"><i class="ti ti-garage" style="font-size:15px" aria-hidden="true"></i>Garage</span>
    </div>

  </div>

  <div class="lv-nav">
    <div class="lv-ni act"><div class="lv-pill"><i class="ti ti-video" aria-hidden="true"></i></div><span class="lv-nl">Live</span></div>
    <div class="lv-ni"><div class="lv-pill"><i class="ti ti-player-track-prev" aria-hidden="true"></i></div><span class="lv-nl">Review</span></div>
    <div class="lv-ni"><div class="lv-pill"><i class="ti ti-compass" aria-hidden="true"></i></div><span class="lv-nl">Explore</span></div>
    <div class="lv-ni"><div class="lv-pill"><i class="ti ti-settings" aria-hidden="true"></i></div><span class="lv-nl">Settings</span></div>
  </div>

</div>
</div>
</div>
</body>
</html>
